{% extends "base.html" %}
{% block title %}Create Account — PeakSelf{% endblock %}
{% block extra_style %}
<style>
.auth-wrap{display:grid;place-items:center;min-height:calc(100vh - 5rem);padding:2rem}
.auth-card{background:rgba(245,242,238,.04);border:1px solid rgba(245,242,238,.1);border-radius:24px;padding:3rem 2.5rem;width:100%;max-width:440px}
.auth-card h1{font-family:'Syne',sans-serif;font-size:2rem;font-weight:700;margin-bottom:.4rem}
.auth-card p.sub{color:rgba(245,242,238,.5);font-size:.9rem;margin-bottom:2rem}
label{display:block;font-size:.82rem;color:rgba(245,242,238,.5);margin-bottom:.4rem;letter-spacing:.04em;text-transform:uppercase}
input{width:100%;background:rgba(245,242,238,.06);border:1px solid rgba(245,242,238,.12);border-radius:12px;padding:.85rem 1rem;color:var(--white);font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s;margin-bottom:1.2rem}
input:focus{border-color:rgba(201,169,110,.5)}
.btn-submit{width:100%;background:var(--gold);color:var(--black);border:none;border-radius:50px;padding:.9rem;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s}
.btn-submit:hover{background:var(--gold2)}
.auth-footer{text-align:center;margin-top:1.5rem;font-size:.85rem;color:rgba(245,242,238,.4)}
.auth-footer a{color:var(--gold);text-decoration:none}
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1>Create your account</h1>
    <p class="sub">Start your journey to becoming your best self.</p>
    <form method="POST">
      <label>Username</label>
      <input type="text" name="username" placeholder="e.g. alex_peak" required autocomplete="username"/>
      <label>Email address</label>
      <input type="email" name="email" placeholder="you@email.com" required autocomplete="email"/>
      <label>Password</label>
      <input type="password" name="password" placeholder="Min. 8 characters" required autocomplete="new-password" minlength="8"/>
      <button class="btn-submit" type="submit">Create Account →</button>
    </form>
    <div class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Log in</a></div>
  </div>
</div>
{% endblock %}
